<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Trophy — USA Custom Trophies</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .add-wrap {
            max-width: 560px;
            margin: 48px auto;
            padding: 0 24px;
        }
        .add-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 48px;
        }
        .add-card h2 {
            font-size: 24px;
            font-weight: 800;
            color: var(--purple);
            margin-bottom: 6px;
        }
        .add-card .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .id-badge {
            display: inline-block;
            background: var(--purple-light);
            color: var(--purple);
            font-weight: 700;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text);
            background: #fafafa;
            transition: border-color 0.15s;
        }
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--purple);
            background: #fff;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            background: #fafafa;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--purple);
            background: var(--purple-light);
        }
        .upload-zone .upload-icon { font-size: 36px; margin-bottom: 8px; }
        .upload-zone p { font-size: 14px; color: var(--muted); margin: 0; }
        .upload-zone .file-name { color: var(--purple); font-weight: 600; margin-top: 8px; }
        #fileInput { display: none; }
        #preview-wrap { display: none; margin-top: 12px; text-align: center; }
        #preview-wrap img { max-height: 180px; border-radius: 6px; }
        .btn-submit {
            width: 100%;
            background: var(--purple);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }
        .btn-submit:hover { background: var(--purple-dark); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        #statusMsg {
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: none;
        }
        #statusMsg.success { background: #d4edda; color: #155724; }
        #statusMsg.error   { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <header>
        <a href="/"><img src="assets/USA-Trophy-banner.jpg" alt="USA Custom Trophies" class="site-banner" /></a>
    </header>

    <div class="add-wrap">
        <div class="add-card">
            <h2>Submit a Trophy</h2>
            <p class="subtitle">Got an image worthy of immortalization? Drop it here.</p>

            <div class="id-badge">Your Trophy ID: <span id="nextId">…</span></div>

            <form id="addForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="trophyName">Trophy Name</label>
                    <input type="text" id="trophyName" name="name" placeholder="e.g. Worst Trade in League History" required />
                </div>

                <div class="form-group">
                    <label for="trophyDesc">Description</label>
                    <textarea id="trophyDesc" name="description" placeholder="Describe the achievement. Be brutal." required></textarea>
                </div>

                <div class="form-group">
                    <label for="trophyPrice">Price</label>
                    <input type="text" id="trophyPrice" name="price" placeholder="e.g. $99.99 or Priceless" required />
                </div>

                <div class="form-group">
                    <label>Trophy Image</label>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-icon">🏆</div>
                        <p>Click to upload or drag & drop</p>
                        <p style="font-size:12px; margin-top:4px;">JPG, PNG, GIF — max 5MB</p>
                        <p class="file-name" id="fileName"></p>
                    </div>
                    <input type="file" id="fileInput" name="image" accept="image/*" required />
                    <div id="preview-wrap"><img id="preview" src="" alt="preview" /></div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Submit Trophy</button>
            </form>

            <div id="statusMsg"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 USA Custom Trophies &mdash; All trophies are fictitious. There is no actual physical trophy. But you'll always have this graphic.</p>
    </footer>

    <script src="add.js"></script>
</body>
</html>
